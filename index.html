<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="سیستم خبره تحلیل سایش و خرابی قطعات صنعتی - Wear & Failure Analysis Expert System">
    <meta name="theme-color" content="#1E2A4A">
    <title data-i18n="app.title">سیستم خبره تحلیل سایش و خرابی قطعات صنعتی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232E7D32'><circle cx='12' cy='12' r='10'/><path d='M12 6v6l4 2' stroke='white' stroke-width='2' fill='none'/></svg>">
    
    <script>
        (function() {
            var lang = null;
            
            var directLang = localStorage.getItem('wearFailureExpertSystem_lang');
            if (directLang === 'en' || directLang === 'fa') {
                lang = directLang;
            }
            
            if (!lang) {
                try {
                    var saved = localStorage.getItem('wearFailureExpertSystem');
                    if (saved) {
                        var data = JSON.parse(saved);
                        if (data.language === 'en' || data.language === 'fa') {
                            lang = data.language;
                        }
                    }
                } catch(e) {}
            }
            
 if (!lang) {
    lang = 'en';
}
            
            localStorage.setItem('wearFailureExpertSystem_lang', lang);
            
            if (lang === 'en') {
                document.documentElement.setAttribute('lang', 'en');
                document.documentElement.setAttribute('dir', 'ltr');
            } else {
                document.documentElement.setAttribute('lang', 'fa');
                document.documentElement.setAttribute('dir', 'rtl');
            }
            
            window.__APP_LANG__ = lang;
        })();
    </script>
</head>
<body>
    <a href="#app-container" class="skip-link">پرش به محتوای اصلی</a>
    
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                <h1 data-i18n="app.title">سیستم خبره تحلیل سایش و خرابی قطعات صنعتی</h1>
            </div>
            <div class="header-actions">
                <div class="language-selector">
                    <svg class="globe-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                    </svg>
                    <select id="language-select">
                        <option value="fa">فارسی</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="header-badge" id="header-step-badge">گام ۱ از ۴</div>
                <button id="btn-header-reset" class="btn btn-secondary" style="display: none; font-size: 0.8rem; padding: 6px 14px;" title="شروع مجدد">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                    </svg>
                    شروع مجدد
                </button>
            </div>
        </div>
    </header>
    
    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="progress-tracker">
                <h3 data-i18n="app.progress">پیشرفت تحلیل</h3>
                <div class="steps" id="steps-container">
                    <div class="step active" data-step="1">
                        <div class="step-indicator">۱</div>
                        <div class="step-content">
                            <span class="step-title">گام ۱: تعیین مسیر</span>
                            <span class="step-status">در حال انجام</span>
                        </div>
                    </div>
                    <div class="step" data-step="2">
                        <div class="step-indicator">۲</div>
                        <div class="step-content">
                            <span class="step-title">گام ۲: تحلیل مکانیزم</span>
                            <span class="step-status">در انتظار</span>
                        </div>
                    </div>
                    <div class="step" data-step="3">
                        <div class="step-indicator">۳</div>
                        <div class="step-content">
                            <span class="step-title">گام ۳: تحلیل جزئیات</span>
                            <span class="step-status">در انتظار</span>
                        </div>
                    </div>
                    <div class="step" data-step="4">
                        <div class="step-indicator">۴</div>
                        <div class="step-content">
                            <span class="step-title">گام ۴: گزارش نهایی</span>
                            <span class="step-status">در انتظار</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flags-panel">
                <h3 data-i18n="app.activeFlags">پرچم‌های فعال</h3>
                <div class="flag-list" id="flags-container">
                    <span class="no-flags">بدون پرچم فعال</span>
                </div>
            </div>
        </aside>
        
        <main class="content" id="app-container">
            <div id="loading-indicator" class="question-card" style="text-align: center;">
                <div style="padding: 40px;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--blue-standard)" stroke-width="2" style="animation: spin 1s linear infinite;">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.3"/>
                        <path d="M12 2a10 10 0 019.95 9" stroke-linecap="round"/>
                    </svg>
                    <p style="margin-top: 16px; color: var(--text-secondary);">در حال بارگذاری...</p>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module" src="script.js"></script>
    
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .skip-link {
            position: absolute;
            top: -100px;
            left: 10px;
            background: #1E2A4A;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            z-index: 1000;
            transition: top 0.2s ease;
            font-family: 'Vazir', Tahoma, sans-serif;
        }
        .skip-link:focus { top: 10px; }
        html[dir="ltr"] .skip-link { left: auto; right: 10px; }
        .content { transition: opacity 0.2s ease; }
        .content.language-changing { opacity: 0.5; }
        @media print { .no-print { display: none; } .print-only { display: block; } }
        @media screen { .print-only { display: none; } }
    </style>
</body>
</html>
